<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!--
    Kiprisma Mark — revised
    Origin: 24, 96
    All shapes float minimally from X and Y axes
    Triangle smaller and latent — mutual containment ambiguity
    Z axis dashed dissipating diagonal vector
  -->

  <!-- blueprint grid -->
  <g stroke="#0a0a0a" stroke-width="0.3" opacity="0.055">
    <line x1="24" y1="0"   x2="24"  y2="112"/>
    <line x1="46" y1="0"   x2="46"  y2="112"/>
    <line x1="68" y1="0"   x2="68"  y2="112"/>
    <line x1="90" y1="0"   x2="90"  y2="112"/>
    <line x1="0"  y1="96"  x2="120" y2="96"/>
    <line x1="0"  y1="74"  x2="120" y2="74"/>
    <line x1="0"  y1="52"  x2="120" y2="52"/>
    <line x1="0"  y1="30"  x2="120" y2="30"/>
  </g>

  <!-- X axis -->
  <line x1="10" y1="96" x2="112" y2="96" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>
  <line x1="107" y1="93" x2="112" y2="96" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>
  <line x1="107" y1="99" x2="112" y2="96" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>

  <!-- Y axis -->
  <line x1="24" y1="110" x2="24" y2="8" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>
  <line x1="21" y1="13" x2="24" y2="8" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>
  <line x1="27" y1="13" x2="24" y2="8" stroke="#0a0a0a" stroke-width="0.85" opacity="0.52"/>

  <!-- axis labels -->
  <text x="114" y="100" font-family="monospace" font-size="7" fill="#0a0a0a" opacity="0.38">x</text>
  <text x="26" y="7" font-family="monospace" font-size="7" fill="#0a0a0a" opacity="0.38">y</text>

  <!-- origin -->
  <circle cx="24" cy="96" r="1.4" fill="#0a0a0a" opacity="0.42"/>

  <!-- tick marks -->
  <g stroke="#0a0a0a" stroke-width="0.5" opacity="0.18">
    <line x1="46" y1="94" x2="46" y2="98"/>
    <line x1="68" y1="94" x2="68" y2="98"/>
    <line x1="90" y1="94" x2="90" y2="98"/>
    <line x1="22" y1="74" x2="26" y2="74"/>
    <line x1="22" y1="52" x2="26" y2="52"/>
    <line x1="22" y1="30" x2="26" y2="30"/>
  </g>

  <!-- Z axis — dashed dissipating diagonal through all three shapes -->
  <line x1="24"  y1="96"  x2="34"  y2="86"  stroke="#0a0a0a" stroke-width="0.7"  opacity="0.5"  stroke-dasharray="2.5,2"/>
  <line x1="34"  y1="86"  x2="46"  y2="74"  stroke="#0a0a0a" stroke-width="0.65" opacity="0.4"  stroke-dasharray="2.5,2"/>
  <line x1="46"  y1="74"  x2="58"  y2="62"  stroke="#0a0a0a" stroke-width="0.6"  opacity="0.28" stroke-dasharray="2.5,2"/>
  <line x1="58"  y1="62"  x2="70"  y2="50"  stroke="#0a0a0a" stroke-width="0.55" opacity="0.18" stroke-dasharray="2.5,2"/>
  <line x1="70"  y1="50"  x2="82"  y2="38"  stroke="#0a0a0a" stroke-width="0.5"  opacity="0.1"  stroke-dasharray="2.5,2"/>
  <line x1="82"  y1="38"  x2="94"  y2="26"  stroke="#0a0a0a" stroke-width="0.4"  opacity="0.05" stroke-dasharray="2.5,2"/>
  <line x1="94"  y1="26"  x2="102" y2="18"  stroke="#0a0a0a" stroke-width="0.35" opacity="0.02" stroke-dasharray="2.5,2"/>
  <line x1="98"  y1="16"  x2="102" y2="18"  stroke="#0a0a0a" stroke-width="0.35" opacity="0.06"/>
  <line x1="100" y1="22"  x2="102" y2="18"  stroke="#0a0a0a" stroke-width="0.35" opacity="0.06"/>
  <text x="104" y="18" font-family="monospace" font-size="6" fill="#0a0a0a" opacity="0.14">z</text>

  <!-- CIRCLE — center(70,50) r=26 — lightest, drawn first -->
  <circle cx="70" cy="50" r="26" fill="none" stroke="#888888" stroke-width="0.9" opacity="0.52"/>
  <line x1="70" y1="24" x2="70" y2="76" stroke="#888888" stroke-width="0.3" opacity="0.18"/>
  <line x1="44" y1="50" x2="96" y2="50" stroke="#888888" stroke-width="0.3" opacity="0.18"/>
  <circle cx="70" cy="24" r="1.1" fill="#888888" opacity="0.42"/>
  <circle cx="70" cy="76" r="1.1" fill="#888888" opacity="0.42"/>
  <circle cx="44" cy="50" r="1.1" fill="#888888" opacity="0.42"/>
  <circle cx="96" cy="50" r="1.1" fill="#888888" opacity="0.42"/>

  <!-- TRIANGLE — smaller, latent, floats just inside square boundary -->
  <!-- apex(70,26) base(53,73)(87,73) — slightly smaller than square, latent -->
  <polygon points="70,26 53,73 87,73"
    fill="none" stroke="#555555" stroke-width="0.85" opacity="0.52"/>
  <line x1="70" y1="26" x2="70" y2="73" stroke="#555555" stroke-width="0.28" opacity="0.15"/>
  <circle cx="70" cy="26" r="1.1" fill="#555555" opacity="0.5"/>
  <circle cx="53" cy="73" r="1.1" fill="#555555" opacity="0.45"/>
  <circle cx="87" cy="73" r="1.1" fill="#555555" opacity="0.45"/>

  <!-- SQUARE — floats minimally from axes — darkest, drawn last -->
  <!-- (48,28)(92,28)(92,72)(48,72) — 4px float from both axes -->
  <rect x="48" y="28" width="44" height="44"
    fill="none" stroke="#0a0a0a" stroke-width="1.1" opacity="0.7"/>
  <line x1="48" y1="28" x2="92" y2="72" stroke="#0a0a0a" stroke-width="0.28" opacity="0.1"/>
  <line x1="92" y1="28" x2="48" y2="72" stroke="#0a0a0a" stroke-width="0.28" opacity="0.1"/>
  <circle cx="48" cy="28" r="1.6" fill="#0a0a0a" opacity="0.65"/>
  <circle cx="92" cy="28" r="1.6" fill="#0a0a0a" opacity="0.65"/>
  <circle cx="48" cy="72" r="1.6" fill="#0a0a0a" opacity="0.65"/>
  <circle cx="92" cy="72" r="1.6" fill="#0a0a0a" opacity="0.65"/>
  <circle cx="70" cy="50" r="1.1" fill="#0a0a0a" opacity="0.2"/>

</svg>
